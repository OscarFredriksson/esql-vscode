name: Build Extension

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run vscode:prepublish

      - name: Package extension
        run: npm run package

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: esql-language-extension
          path: '*.vsix'
          retention-days: 90

      - name: Create Release (on push to main/master)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          files: '*.vsix'
          tag_name: v${{ steps.version.outputs.VERSION }}
          body: |
            ESQL Language v${{ steps.version.outputs.VERSION }}
            
            Built from commit ${{ github.sha }}
            
            Download the `.vsix` file to install the extension locally in VS Code:
            1. In VS Code, open Extensions (Ctrl+Shift+X / Cmd+Shift+X)
            2. Click the "..." menu and select "Install from VSIX..."
            3. Select the downloaded `.vsix` file
          draft: false
          prerelease: false
